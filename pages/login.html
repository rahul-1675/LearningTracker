<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EduPathway</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components/toast.css">
</head>
<body class="auth-body">
    <div class="auth-container glass-card">
        <a href="../index.html" class="logo-brand">
            <span>🎓</span> 
            <span class="logo-text">EduPathway</span>
        </a>
        <p class="auth-subtitle">Sign in to your learning dashboard</p>
        
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" placeholder="e.g. rahul" required autocomplete="username">
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
            </div>

            <!-- Remember me row -->
            <div class="form-group" style="display: flex; align-items: center; gap: 0.5rem; margin-top: -0.25rem; margin-bottom: 1.25rem;">
                <input type="checkbox" id="rememberMe" checked style="width: auto; cursor: pointer;">
                <label for="rememberMe" style="margin-bottom: 0; cursor: pointer; font-size: 0.8rem; font-weight: 600;">Remember my session</label>
            </div>
            
            <p id="loginError" class="error-message"></p>
            
            <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center; padding: 0.8rem;">
                Sign In
            </button>
        </form>
        
        <p class="auth-switch">
            Don't have an account? <a href="register.html">Register here</a>
        </p>
    </div>

    <!-- Scripts -->
    <script src="../js/storage.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/auth.js"></script>
</body>
</html>
