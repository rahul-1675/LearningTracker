<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Manager - EduPathway</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components/pomodoro.css">
    <link rel="stylesheet" href="../css/components/toast.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-brand">
                <span>🎓</span> 
                <span class="logo-text">EduPathway</span>
            </div>
            <button class="close-sidebar-btn">&times;</button>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html"><span>🏠</span>Dashboard</a>
            <a href="tasks.html" class="active"><span>✔️</span>Tasks</a>
            <a href="goals.html"><span>🎯</span>Goals</a>
            <a href="calendar.html"><span>📅</span>Calendar</a>
        </nav>

        <!-- Persistent Pomodoro Timer Container -->
        <div id="pomodoroTimerContainer"></div>

        <!-- Sidebar Footer & Theme Toggle -->
        <div style="margin-top: auto;">
            <div class="theme-switch-wrapper">
                <span class="theme-switch-label" id="themeToggleLabel">Light Mode</span>
                <button id="themeToggleBtn" class="theme-toggle-btn">🌙</button>
            </div>
            <a href="#" id="logoutBtn" class="nav-menu-logout"><span>↩️</span>Logout</a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-content-wrapper">
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="open-sidebar-btn">☰</button>
                    <div>
                        <h1>Task Manager</h1>
                        <p class="header-meta">Organize and drag-reorder your academic tasks.</p>
                    </div>
                </div>
                <button id="addTaskBtn" class="btn btn-primary">+ Add Task</button>
            </header>

            <!-- Search and Filtering Header -->
            <div class="tabs-and-actions glass-card">
                <!-- Search bar -->
                <div class="search-bar-container">
                    <input type="text" id="taskSearchInput" placeholder="Search tasks by title, subject...">
                </div>

                <!-- Tabs for Status filtering -->
                <div class="tabs" id="taskTabs">
                    <button class="tab-button active" data-filter="all">All Tasks</button>
                    <button class="tab-button" data-filter="pending">Pending</button>
                    <button class="tab-button" data-filter="in-progress">In Progress</button>
                    <button class="tab-button" data-filter="completed">Completed</button>
                </div>
            </div>

            <!-- Priority Filters Row -->
            <div style="display: flex; gap: 0.5rem; align-items: center; margin-top: -0.5rem; margin-bottom: 1.5rem; flex-wrap: wrap;">
                <span style="font-size: 0.8rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase;">Priority filter:</span>
                <button class="btn btn-secondary priority-filter-btn active" data-priority="all" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: var(--radius-sm);">All</button>
                <button class="btn btn-secondary priority-filter-btn" data-priority="high" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: var(--radius-sm); color: var(--danger);">High</button>
                <button class="btn btn-secondary priority-filter-btn" data-priority="medium" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: var(--radius-sm); color: var(--warning);">Medium</button>
                <button class="btn btn-secondary priority-filter-btn" data-priority="low" style="padding: 0.35rem 0.75rem; font-size: 0.75rem; border-radius: var(--radius-sm); color: var(--success);">Low</button>
            </div>

            <!-- Tasks Container -->
            <section id="taskListContainer" class="task-list">
                <!-- Tasks will load here dynamically -->
            </section>
        </div>
    </div>

    <!-- Add/Edit Task Modal -->
    <div id="addTaskModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle">Add New Task</h2>
                <button id="closeTaskModalBtn" class="close-button">&times;</button>
            </div>
            <form id="addTaskForm">
                <div class="modal-body">
                    <div class="form-group">
                        <label for="taskTitle">Task Title</label>
                        <input type="text" id="taskTitle" placeholder="e.g. Study Chemistry Chapter 4" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskSubject">Subject / Category</label>
                        <input type="text" id="taskSubject" placeholder="e.g. Chemistry" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskDescription">Description</label>
                        <textarea id="taskDescription" rows="3" placeholder="Brief outline of notes, tasks..."></textarea>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskDueDate">Due Date</label>
                        <input type="date" id="taskDueDate" required>
                    </div>
                    
                    <div class="form-group">
                        <label for="taskPriority">Priority</label>
                        <select id="taskPriority">
                            <option value="medium">Medium</option>
                            <option value="high">High</option>
                            <option value="low">Low</option>
                        </select>
                    </div>
                    
                    <div class="form-group">
                        <label>Estimated Time</label>
                        <div class="time-input-group">
                            <input type="number" id="taskTimeValue" min="1" placeholder="30" required>
                            <select id="taskTimeUnit">
                                <option value="minutes">Minutes</option>
                                <option value="hours">Hours</option>
                                <option value="seconds">Seconds</option>
                            </select>
                        </div>
                    </div>
                </div>
                
                <div class="modal-footer">
                    <button type="button" id="cancelTaskModalBtn" class="btn btn-secondary">Cancel</button>
                    <button type="submit" id="saveTaskBtn" class="btn btn-primary">Add Task</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Overlay for mobile drawer -->
    <div class="overlay"></div>

    <!-- Scripts -->
    <script src="../js/storage.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/pomodoro.js"></script>
    <script src="../js/tasks.js"></script>
</body>
</html>
