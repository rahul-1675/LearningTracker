<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calendar - EduPathway</title>
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/components/pomodoro.css">
    <link rel="stylesheet" href="../css/components/toast.css">
</head>
<body>
    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <div class="logo-brand">
                <span>🎓</span> 
                <span class="logo-text">EduPathway</span>
            </div>
            <button class="close-sidebar-btn">&times;</button>
        </div>
        
        <nav class="nav-menu">
            <a href="dashboard.html"><span>🏠</span>Dashboard</a>
            <a href="tasks.html"><span>✔️</span>Tasks</a>
            <a href="goals.html"><span>🎯</span>Goals</a>
            <a href="calendar.html" class="active"><span>📅</span>Calendar</a>
        </nav>

        <!-- Persistent Pomodoro Timer Container -->
        <div id="pomodoroTimerContainer"></div>

        <!-- Sidebar Footer & Theme Toggle -->
        <div style="margin-top: auto;">
            <div class="theme-switch-wrapper">
                <span class="theme-switch-label" id="themeToggleLabel">Light Mode</span>
                <button id="themeToggleBtn" class="theme-toggle-btn">🌙</button>
            </div>
            <a href="#" id="logoutBtn" class="nav-menu-logout"><span>↩️</span>Logout</a>
        </div>
    </aside>

    <!-- Main Content Area -->
    <div class="main-content-wrapper">
        <div class="main-content">
            <!-- Header -->
            <header class="header">
                <div class="header-left">
                    <button class="open-sidebar-btn">☰</button>
                    <div>
                        <h1>Study Calendar</h1>
                        <p class="header-meta">Check your schedule and track deadlines visually.</p>
                    </div>
                </div>
            </header>

            <!-- Calendar Container -->
            <section class="calendar-container glass-card">
                <!-- Navigation -->
                <div class="calendar-header">
                    <button id="prevMonthBtn" class="calendar-nav-btn">&lt;</button>
                    <h2 id="monthYearDisplay">June 2026</h2>
                    <button id="nextMonthBtn" class="calendar-nav-btn">&gt;</button>
                </div>

                <!-- Weekdays Header -->
                <div class="calendar-weekdays">
                    <div>Sun</div>
                    <div>Mon</div>
                    <div>Tue</div>
                    <div>Wed</div>
                    <div>Thu</div>
                    <div>Fri</div>
                    <div>Sat</div>
                </div>

                <!-- Calendar Days Grid -->
                <div id="calendarGrid" class="calendar-grid">
                    <!-- Loaded dynamically via js -->
                </div>
            </section>
        </div>
    </div>

    <!-- Day Details Modal -->
    <div id="calendarDayModal" class="modal-overlay">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="dayModalDateTitle">Date Details</h2>
                <button id="closeDayModalBtn" class="close-button">&times;</button>
            </div>
            <div class="modal-body">
                <div id="dayModalDetailsContent">
                    <!-- Dynamic details load here -->
                </div>
            </div>
            <div class="modal-footer">
                <button type="button" id="closeDayModalFooterBtn" class="btn btn-secondary">Close</button>
            </div>
        </div>
    </div>

    <!-- Overlay for mobile drawer -->
    <div class="overlay"></div>

    <!-- Scripts -->
    <script src="../js/storage.js"></script>
    <script src="../js/toast.js"></script>
    <script src="../js/theme.js"></script>
    <script src="../js/auth.js"></script>
    <script src="../js/pomodoro.js"></script>
    <script src="../js/calendar.js"></script>
</body>
</html>
